<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data-Table Engine</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; cursor: pointer; }
        th:hover { background-color: #e0e0e0; }
        .totales { background-color: #e6f7ff; font-weight: bold; }
        input[type="text"] { padding: 8px; width: 300px; }
        input[type="number"] { width: 60px; padding: 4px; }
    </style>
</head>
<body>

    <h2>Data-Table Engine</h2>

    <div style="margin-bottom: 15px; padding: 15px; background-color: #f9f9f9; border: 1px solid #ccc;">
        <label for="inputFile"><strong>Cargar archivo JSON:</strong></label>
        <input type="file" id="inputFile" accept=".json">
        <button onclick="cargarDatosPrueba()" style="margin-left: 10px; padding: 5px 10px;">Restaurar Datos de Prueba</button>
    </div>

    <div>
        <input type="text" id="inputBusqueda" placeholder="Buscar por nombre en tiempo real...">
    </div>

    <table id="miTabla">
        <thead>
            <tr>
                <th onclick="ordenarPor('id')">ID <span id="flecha-id"></span></th>
                <th onclick="ordenarPor('nombre')">Nombre <span id="flecha-nombre"></span></th>
                <th onclick="ordenarPor('edad')">Edad <span id="flecha-edad"></span></th>
                <th onclick="ordenarPor('nota')">Nota (Editable) <span id="flecha-nota"></span></th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            </tbody>
        <tfoot>
            <tr class="totales">
                <td colspan="3" style="text-align: right;">Promedio de Notas:</td>
                <td id="celdaPromedio">0.00</td>
            </tr>
        </tfoot>
    </table>

    <script src="app.js"></script>
</body>
</html>
